<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notion Planner</title>
  <link rel="icon" type="image/png" href="sparkles_2728.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.jpg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #333;
      background: transparent;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      touch-action: manipulation;
    }

    #widget-container {
      width: 100%;
      max-width: 400px;
      height: 700px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e5e7;
      flex-shrink: 0;
    }

    .header h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: #1d1d1f;
    }

    .header-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .loading {
      display: inline-block;
      min-width: 16px;
      min-height: 16px;
      font-size: 10px;
      color: #999;
      margin-right: 4px;
      padding: 2px;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
    }

    button {
      background: none;
      border: none;
      font-size: 12px;
      color: #999;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    button:hover {
      background: rgba(153, 153, 153, 0.1);
    }

    #content {
      flex: 1;
      overflow-y: scroll;
      overflow-x: hidden;
      margin-right: -20px;
      padding-right: 20px;
    }

    #content::-webkit-scrollbar {
      width: 8px;
    }

    #content::-webkit-scrollbar-track {
      background: transparent;
    }

    #content::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 10px;
    }

    #content::-webkit-scrollbar-thumb:hover {
      background: #999;
    }

    .section-title {
      margin: 0 0 12px 0;
      font-size: 14px;
      font-weight: 600;
      color: #666;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      padding: 12px;
      background: #fff;
      border: 1px solid #e5e5e7;
      border-radius: 10px;
      transition: all 0.2s;
    }

    .task-item.completed {
      background: #f5f5f7;
      opacity: 0.6;
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .task-content {
      flex: 1;
    }

    .task-title {
      font-size: 13px;
      font-weight: 500;
      color: #1d1d1f;
      margin-bottom: 6px;
    }

    .task-title.completed {
      text-decoration: line-through;
    }

    .checkbox {
      background: #fff;
      border: 2px solid #999;
      border-radius: 6px;
      width: 24px;
      height: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .checkbox.checked {
      background: #999;
      border: none;
    }

    input[type="text"], input[type="number"], input[type="date"], select {
      font-family: inherit;
      font-size: 11px;
    }

    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #e5e5e7;
      font-size: 11px;
      color: #86868b;
      text-align: center;
      flex-shrink: 0;
    }

    .empty-message {
      color: #999;
      font-size: 12px;
      margin: 20px 0;
      text-align: center;
    }

    .calendar-date-group {
      min-height: 50px;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .calendar-item {
      background: #fff;
      border: 1px solid #e5e5e7;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 6px;
      transition: all 0.2s;
    }

    .calendar-item:hover {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transform: translateY(-1px);
    }

    .calendar-item:active {
      cursor: grabbing;
    }
  </style>
</head>
<body>
  <div id="widget-container">
    <div class="header">
      <div style="display: flex; align-items: center; gap: 8px;">
        <h2 onclick="toggleCalendarView()" style="cursor: pointer; margin: 0; display: flex; align-items: center; gap: 6px;" title="달력 보기"><img src="sparkles_2728.png" style="width: 22px; height: 22px; vertical-align: middle;"> PLANNER</h2>
        <button id="dday-button" onclick="toggleDDaySelector()" style="font-size: 11px; padding: 2px 6px; background: #999; color: white; border: none; border-radius: 4px; cursor: pointer;">D-Day</button>
      </div>
      <div class="header-buttons">
        <span class="loading" id="loading"></span>
        <button id="view-toggle">TIME TABLE</button>
        <button id="gcal-sync-btn" onclick="syncToGoogleCalendar()" title="Google Calendar에 동기화" style="font-size: 11px; padding: 2px 6px;">📅 GCal</button>
        <button onclick="toggleGCalSettings()" title="Google Calendar 설정" style="font-size: 11px; padding: 2px 4px; background: none; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; color: #666;">⚙️</button>
      </div>
    </div>

    <!-- Google Calendar 설정 패널 -->
    <div id="gcal-settings-panel" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; border:1px solid #ddd; border-radius:10px; padding:20px; z-index:9999; box-shadow:0 4px 20px rgba(0,0,0,0.15); width:320px;">
      <div style="font-weight:600; margin-bottom:12px; font-size:14px;">Google Calendar 설정</div>
      <div style="font-size:12px; color:#666; margin-bottom:10px; line-height:1.5;">
        <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:#4285f4;">Google Cloud Console</a>에서<br>
        OAuth 2.0 클라이언트 ID(웹 앱)를 발급받아 입력하세요.
      </div>
      <input type="text" id="gcal-client-id-input" placeholder="Client ID (…googleusercontent.com)"
        style="width:100%; padding:8px; border:1px solid #ddd; border-radius:6px; font-size:12px; margin-bottom:10px; box-sizing:border-box;">
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button onclick="toggleGCalSettings()" style="padding:6px 12px; border:1px solid #ddd; border-radius:6px; background:white; cursor:pointer; font-size:12px;">취소</button>
        <button onclick="saveGCalClientId()" style="padding:6px 12px; background:#4285f4; color:white; border:none; border-radius:6px; cursor:pointer; font-size:12px;">저장</button>
      </div>
    </div>
    <div id="gcal-settings-overlay" onclick="toggleGCalSettings()" style="display:none; position:fixed; inset:0; z-index:9998;"></div>

    <div id="content">
      <div class="empty-message">데이터 로딩 중...</div>
    </div>

    <div class="footer">
      마지막 업데이트: <span id="last-update">--:--</span>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="widget.js?v=44"></script>
</body>
</html>
